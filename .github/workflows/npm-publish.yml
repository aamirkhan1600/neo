name: Deploy Node App to EC2

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: 20

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build --if-present

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |

            APP_DIR=/home/ubuntu/neo

            # Clone project first time
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/aamirkhan1600/neo.git $APP_DIR
            fi

            cd $APP_DIR

            # Pull latest code
            git fetch --all
            git reset --hard origin/main

            # Install dependencies
            npm install

            # Build project
            npm run build --if-present

            # Restart app
            pm2 restart neo || pm2 start npm --name neo -- start

            # Save PM2
            pm2 save

            echo "Deployment Successful"
